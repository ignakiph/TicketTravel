<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TicketTravel - Mis Tickets de Viaje</title>
    <meta name="description" content="Guarda tus tickets de viaje con foto y GPS localmente.">
    <!-- Iconos y manifiesto para PWA -->
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --danger: #ff5252;
            --surface: #2c2c2c;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 80px; /* Espacio para el botón flotante */
        }
        /* --- Header --- */
        header {
            padding: 24px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        /* --- Listado de Tickets --- */
        #ticket-list {
            padding: 16px;
            display: grid;
            gap: 16px;
        }
        .ticket-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
            position: relative;
        }
        .ticket-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .ticket-info {
            padding: 12px;
        }
        .ticket-date {
            font-size: 0.75rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
        }
        .ticket-loc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: var(--danger);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }
        /* --- Pantalla Vacía --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: var(--surface);
            margin-bottom: 16px;
        }
        /* --- Cámara / Modal --- */
        #camera-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        video {
            flex: 1;
            object-fit: cover; /* Importante para móvil */
            width: 100%;
        }
        .camera-controls {
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: linear-gradient(to top, #000, transparent);
        }
        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 5px solid #fff;
            background: rgba(255,255,255,0.2);
            position: relative;
        }
        .shutter-btn:active {
            transform: scale(0.9);
        }
        .close-camera {
            color: #fff;
            background: none;
            border: none;
            font-size: 1.5rem;
        }
        /* --- Botón Flotante --- */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            color: #000;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
            border: none;
            z-index: 50;
        }
        .fab svg {
            width: 24px;
            height: 24px;
            stroke-width: 3;
        }
        /* Utils */
        .hidden { display: none !important; }
        /* Loading Spinner */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Mis Tickets</h1>
        <p class="subtitle">Organiza tus viajes localmente</p>
    </header>
    <main id="ticket-list">
        <!-- Los tickets aparecerán aquí -->
    </main>
    <!-- Botón para añadir foto -->
    <button class="fab" id="open-camera-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
    <!-- Interfaz de Cámara -->
    <div id="camera-view">
        <video id="video-stream" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="close-camera" id="cancel-camera">Cerrar</button>
            <button class="shutter-btn" id="take-photo"></button>
            <div style="width: 50px;"></div> <!-- Spacer -->
        </div>
    </div>
    <!-- Canvas oculto para procesar la foto -->
    <canvas id="photo-canvas" class="hidden"></canvas>
    <script>
        // --- CONFIGURACIÓN BASE DE DATOS (IndexedDB) ---
        const DB_NAME = 'TravelTicketsDB';
        const DB_VERSION = 1;
        let db;
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('tickets')) {
                db.createObjectStore('tickets', { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadTickets();
        };
        // --- FUNCIONALIDAD ---
        const video = document.getElementById('video-stream');
        const cameraView = document.getElementById('camera-view');
        const canvas = document.getElementById('photo-canvas');
        const ticketList = document.getElementById('ticket-list');
        // Abrir Cámara
        document.getElementById('open-camera-btn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                video.srcObject = stream;
                cameraView.style.display = 'flex';
                // Bloquear scroll body
                document.body.style.overflow = 'hidden';
            } catch (err) {
                alert('No se pudo acceder a la cámara: ' + err.message);
            }
        });
        // Cerrar Cámara
        document.getElementById('cancel-camera').addEventListener('click', () => {
            stopCamera();
        });
        function stopCamera() {
            const stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            cameraView.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        // Tomar Foto y Guardar
        document.getElementById('take-photo').addEventListener('click', async () => {
            // Capturar GPS primero (para que sea rápido)
            let location = { lat: null, lon: null };
            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 });
                });
                location = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            } catch (e) {
                console.warn('GPS no disponible:', e);
            }
            // Dibujar video en canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            // Convertir a Blob (Foto real)
            canvas.toBlob(async (blob) => {
                const ticketData = {
                    image: blob,
                    timestamp: new Date().getTime(),
                    lat: location.lat,
                    lon: location.lon
                };
                // Guardar en DB
                const transaction = db.transaction(['tickets'], 'readwrite');
                transaction.objectStore('tickets').add(ticketData);
                
                transaction.oncomplete = () => {
                    stopCamera();
                    loadTickets();
                };
            }, 'image/jpeg', 0.8);
        });
        // Cargar Tickets del Listado
        function loadTickets() {
            ticketList.innerHTML = '';
            const transaction = db.transaction(['tickets'], 'readonly');
            const store = transaction.objectStore('tickets');
            const request = store.getAll();
            request.onsuccess = () => {
                const tickets = request.result;
                if (tickets.length === 0) {
                    showEmptyState();
                    return;
                }
                // Ordenar por fecha (más reciente primero)
                tickets.reverse().forEach(ticket => {
                    renderTicketCard(ticket);
                });
            };
        }
        function renderTicketCard(ticket) {
            const card = document.createElement('div');
            card.className = 'ticket-card';
            
            const url = URL.createObjectURL(ticket.image);
            const dateStr = new Date(ticket.timestamp).toLocaleDateString('es-ES', { 
                day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
            const locationText = (ticket.lat && ticket.lon) 
                ? `📍 ${ticket.lat.toFixed(4)}, ${ticket.lon.toFixed(4)}`
                : '📍 Ubicación no disponible';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteTicket(${ticket.id})">×</button>
                <img src="${url}" alt="Ticket">
                <div class="ticket-info">
                    <div class="ticket-date">${dateStr}</div>
                    <div class="ticket-loc">${locationText}</div>
                </div>
            `;
            ticketList.appendChild(card);
        }
        function showEmptyState() {
            ticketList.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-5-5z"/></svg>
                    <p>No tienes tickets guardados.</p>
                    <p style="font-size: 0.8rem">¡Pulsa el botón + para empezar!</p>
                </div>
            `;
        }
        // Borrar Ticket
        window.deleteTicket = (id) => {
            if (confirm('¿Quieres eliminar este ticket?')) {
                const transaction = db.transaction(['tickets'], 'readwrite');
                transaction.objectStore('tickets').delete(id);
                transaction.oncomplete = () => loadTickets();
            }
        };
    </script>
</body>
</html>
